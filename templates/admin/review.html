<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Claim</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      padding: 30px;
      margin: 0;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    h2 {
      margin-bottom: 20px;
    }
    .back {
      display: inline-block;
      margin-bottom: 15px;
      text-decoration: none;
      background: #3b82f6;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .claim-details p {
      margin: 10px 0;
      font-size: 16px;
    }
    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }
    .accept {
      background: green;
    }
    .reject {
      background: red;
    }
    .changes {
      background: #4f46e5;
    }
    .reject-box {
      display: none;
      margin-top: 15px;
    }
    .changes-box {
      display: none;
      margin-top: 15px;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
      box-sizing: border-box;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div class="container">
  <a href="all-requests.html" class="back">← Back</a>
  <h2>Review Claim</h2>
  <div class="claim-details">
    <p><b>ID:</b> <span id="id"></span></p>
    <p><b>Name:</b> <span id="name"></span></p>
    <p><b>Type:</b> <span id="type"></span></p>
    <p><b>Category:</b> <span id="category"></span></p>
    <p><b>Amount:</b> ₹<span id="amount"></span></p>
    <p><b>Description:</b> <span id="desc"></span></p>
  </div>
  <img id="proof" src="" alt="Proof document">
  <div class="buttons">
    <button class="accept" onclick="acceptClaim()">Accept</button>
    <button class="changes" onclick="showChanges()">Request Changes</button>
    <button class="reject" onclick="showReject()">Reject</button>
  </div>

  <div class="changes-box" id="changesBox">
    <textarea id="changesReason" placeholder="Specify what needs to be changed or clarified..."></textarea>
    <button onclick="submitChanges()" style="background:#4f46e5; margin-top:8px;">
      Send Change Request
    </button>
  </div>

  <div class="reject-box" id="rejectBox">
    <textarea id="rejectReason" placeholder="Enter reason for rejection..."></textarea>
    <button onclick="rejectClaim()" style="background:red; margin-top:8px;">
      Submit
    </button>
  </div>

  <p id="status"></p>
</div>
<script>
  function loadData() {
    const params = new URLSearchParams(window.location.search);
    document.getElementById("id").innerText       = params.get("id") || "";
    document.getElementById("name").innerText     = params.get("name") || "";
    document.getElementById("type").innerText     = params.get("type") || "";
    document.getElementById("category").innerText = params.get("category") || "";
    document.getElementById("amount").innerText   = params.get("amount") || "";
    document.getElementById("desc").innerText     = params.get("desc") || "";
    document.getElementById("proof").src =
      params.get("proof") || "https://via.placeholder.com/600x300?text=No+Proof";
  }

  function acceptClaim() {
    document.getElementById("status").innerText = "✅ Claim Approved!";
    document.getElementById("rejectBox").style.display = "none";
    document.getElementById("changesBox").style.display = "none";
  }

  function showReject() {
    document.getElementById("rejectBox").style.display = "block";
    document.getElementById("changesBox").style.display = "none";
  }

  function showChanges() {
    document.getElementById("changesBox").style.display = "block";
    document.getElementById("rejectBox").style.display = "none";
  }

  function rejectClaim() {
    let reason = document.getElementById("rejectReason").value;
    if (reason.trim() === "") {
      alert("Enter reason!");
      return;
    }
    document.getElementById("status").innerText = "❌ Claim Rejected: " + reason;
  }

  function submitChanges() {
    let reason = document.getElementById("changesReason").value;
    if (reason.trim() === "") {
      alert("Please specify what changes are needed!");
      return;
    }
    document.getElementById("status").innerText = "🔄 Changes Requested: " + reason;
  }

  window.onload = loadData;
</script>
</body>
</html>
